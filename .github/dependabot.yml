version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      linting:
        patterns:
          - '*eslint*'
          - 'eslint'
          - 'eslint*'
      formatting:
        patterns:
          - 'prettier'
          - 'prettier-plugin-organize-imports'
      cloudflare:
        patterns:
          - '@cloudflare/workers-types'
          - 'wrangler'
      happy-dom:
        patterns:
          - '@happy-dom'
          - 'happy-dom'
